<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liam</title>
<style>
  :root {
    --ink: #111111;
    --muted: #6b6b6b;
    --hairline: #e8e8e8;
    --bg: #ffffff;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Aktiv Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 40px;
    z-index: 10;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(6px);
  }

  .wordmark {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  header nav a {
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    margin-left: 28px;
    transition: opacity 0.2s ease;
  }

  header nav a:hover {
    opacity: 0.6;
  }

  main {
    min-height: 100vh;
    padding-top: 90px;
    display: flex;
    flex-direction: column;
  }

  .work {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 0 24px;
  }

  .work-heading {
    display: flex;
    align-items: baseline;
    justify-content: flex-end;
    padding: 0 40px;
    margin-bottom: 20px;
  }

  .controls {
    display: flex;
    gap: 10px;
  }

  .controls button {
    width: 32px;
    height: 32px;
    border: none;
    background: none;
    color: var(--ink);
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s ease;
  }

  .controls button:hover {
    opacity: 0.6;
  }

  .carousel {
    display: flex;
    gap: 28px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 0 8vw 12px;
    scrollbar-width: none;
  }

  .carousel::-webkit-scrollbar {
    display: none;
  }

  .card {
    flex: 0 0 auto;
    scroll-snap-align: center;
    transition: transform 0.3s ease;
  }

  .card:hover + .card {
    transform: translateX(14px);
  }

  .card:has(+ .card:hover) {
    transform: translateX(-14px);
  }

  .thumb {
    width: min(80vw, 99vh);
    aspect-ratio: 16 / 10;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    position: relative;
    overflow: hidden;
    transform-origin: center center;
    transition: transform 0.3s ease, filter 0.3s ease;
  }

  .card:hover .thumb {
    transform: scale(1.035);
  }

  .carousel:has(.card:hover) .card:not(:hover) .thumb {
    filter: brightness(0.9);
  }

  .thumb.is-photo {
    background: none;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb::after {
    content: attr(data-index);
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 0.05em;
  }

  .card h3 {
    font-size: 16px;
    font-weight: 500;
    margin: 18px 0 4px;
  }

  .card span {
    display: block;
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
  }

  #loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }

  #loader.hide {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .raffle {
    display: flex;
    gap: 12px;
  }

  .reel {
    width: 46px;
    height: 68px;
    overflow: hidden;
    position: relative;
    border-bottom: 2px solid var(--ink);
  }

  .reel-strip {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .reel-strip span {
    height: 68px;
    line-height: 68px;
    font-size: 46px;
    font-weight: 700;
    text-align: center;
  }

  @media (max-width: 640px) {
    header, .work-heading, .carousel {
      padding-left: 24px;
      padding-right: 24px;
    }

    .thumb {
      width: 88vw;
    }
  }
</style>
</head>
<body>

<div id="loader" aria-hidden="true">
  <div class="raffle">
    <div class="reel"></div>
    <div class="reel"></div>
    <div class="reel"></div>
    <div class="reel"></div>
  </div>
</div>

<header>
  <div class="wordmark">Liam</div>
  <nav>
    <a href="#about">About</a>
    <a href="#work">Work</a>
  </nav>
</header>

<main>
  <section class="work" id="work">
    <div class="work-heading">
      <div class="controls">
        <button id="prev" aria-label="Previous">&#8592;</button>
        <button id="next" aria-label="Next">&#8594;</button>
      </div>
    </div>

    <div class="carousel" id="carousel">
      <div class="card">
        <div class="thumb is-photo" data-index="01">
          <img src="portfolio projects/ArtDivision/artdivison-freeway_signage-mockup.jpg" alt="Art Division &mdash; freeway signage mockup">
        </div>
        <h3>ArtDivision</h3>
        <span>Branding, Website, Etc.</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="02" style="--c1:#e4ddd3; --c2:#b9ac97;"></div>
        <h3>Project Two</h3>
        <span>Placeholder</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="03" style="--c1:#d9e0e4; --c2:#9fb0b8;"></div>
        <h3>Project Three</h3>
        <span>Placeholder</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="04" style="--c1:#e3dbe6; --c2:#b8a4c0;"></div>
        <h3>Project Four</h3>
        <span>Placeholder</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="05" style="--c1:#dde4d8; --c2:#a9baa0;"></div>
        <h3>Project Five</h3>
        <span>Placeholder</span>
      </div>
    </div>
  </section>
</main>

<script>
  (function () {
    const loader = document.getElementById('loader');
    const reels = Array.from(document.querySelectorAll('.reel'));
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const targets = ['L', 'I', 'A', 'M'];
    const letterHeight = 68;
    const spinCount = 26;
    const durations = [1300, 1650, 2000, 2350];

    document.body.style.overflow = 'hidden';

    reels.forEach((reel, i) => {
      const strip = document.createElement('div');
      strip.className = 'reel-strip';
      for (let j = 0; j < spinCount; j++) {
        const span = document.createElement('span');
        span.textContent = letters[Math.floor(Math.random() * letters.length)];
        strip.appendChild(span);
      }
      const finalSpan = document.createElement('span');
      finalSpan.textContent = targets[i];
      strip.appendChild(finalSpan);
      reel.appendChild(strip);

      requestAnimationFrame(() => {
        strip.style.transition = `transform ${durations[i]}ms cubic-bezier(0.12, 0.88, 0.18, 1)`;
        strip.style.transform = `translateY(-${spinCount * letterHeight}px)`;
      });
    });

    setTimeout(() => {
      loader.classList.add('hide');
      document.body.style.overflow = '';
    }, Math.max(...durations) + 500);
  })();

  (function () {
    const track = document.getElementById('carousel');
    const originals = Array.from(track.children);
    const count = originals.length;

    const firstClone = originals[0].cloneNode(true);
    const lastClone = originals[count - 1].cloneNode(true);
    track.insertBefore(lastClone, originals[0]);
    track.appendChild(firstClone);

    const cards = Array.from(track.children);
    let index = 1;

    function centerScrollLeft(el) {
      const trackRect = track.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      return track.scrollLeft + (elRect.left - trackRect.left) - (track.clientWidth - elRect.width) / 2;
    }

    function goTo(i, smooth) {
      index = i;
      track.scrollTo({ left: centerScrollLeft(cards[i]), behavior: smooth ? 'smooth' : 'auto' });
    }

    goTo(1, false);

    document.getElementById('next').addEventListener('click', () => goTo(index + 1, true));
    document.getElementById('prev').addEventListener('click', () => goTo(index - 1, true));

    function settle() {
      const trackRect = track.getBoundingClientRect();
      const center = trackRect.left + track.clientWidth / 2;
      let closest = index;
      let minDist = Infinity;
      cards.forEach((c, i) => {
        const r = c.getBoundingClientRect();
        const dist = Math.abs((r.left + r.width / 2) - center);
        if (dist < minDist) {
          minDist = dist;
          closest = i;
        }
      });
      index = closest;
      if (index === 0) {
        goTo(count, false);
      } else if (index === cards.length - 1) {
        goTo(1, false);
      }
    }

    if ('onscrollend' in window) {
      track.addEventListener('scrollend', settle);
    } else {
      let settleTimer;
      track.addEventListener('scroll', () => {
        clearTimeout(settleTimer);
        settleTimer = setTimeout(settle, 60);
      });
    }

    window.addEventListener('resize', () => goTo(index, false));

    const EDGE_ZONE = 0.16;
    const MAX_SPEED = 9;
    let hoverDir = 0;
    let hoverSpeed = 0;
    let hoverRaf = null;

    function autoScrollStep() {
      track.scrollLeft += hoverDir * hoverSpeed;
      settle();
      hoverRaf = requestAnimationFrame(autoScrollStep);
    }

    function startAutoScroll() {
      track.style.scrollSnapType = 'none';
      if (!hoverRaf) hoverRaf = requestAnimationFrame(autoScrollStep);
    }

    function stopAutoScroll() {
      if (hoverRaf) {
        cancelAnimationFrame(hoverRaf);
        hoverRaf = null;
      }
      track.style.scrollSnapType = '';
      const trackRect = track.getBoundingClientRect();
      const center = trackRect.left + track.clientWidth / 2;
      let closest = index;
      let minDist = Infinity;
      cards.forEach((c, i) => {
        const r = c.getBoundingClientRect();
        const dist = Math.abs((r.left + r.width / 2) - center);
        if (dist < minDist) {
          minDist = dist;
          closest = i;
        }
      });
      goTo(closest, true);
    }

    track.addEventListener('mousemove', (e) => {
      const rect = track.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      if (ratio < EDGE_ZONE) {
        hoverDir = -1;
        hoverSpeed = MAX_SPEED * (1 - ratio / EDGE_ZONE);
        startAutoScroll();
      } else if (ratio > 1 - EDGE_ZONE) {
        hoverDir = 1;
        hoverSpeed = MAX_SPEED * ((ratio - (1 - EDGE_ZONE)) / EDGE_ZONE);
        startAutoScroll();
      } else if (hoverDir !== 0) {
        hoverDir = 0;
        stopAutoScroll();
      }
    });

    track.addEventListener('mouseleave', () => {
      if (hoverDir !== 0) {
        hoverDir = 0;
        stopAutoScroll();
      }
    });
  })();
</script>

</body>
</html>
