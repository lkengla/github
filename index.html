<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Liam</title>
<style>
  :root {
    --ink: #111111;
    --muted: #6b6b6b;
    --hairline: #e8e8e8;
    --bg: #ffffff;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Aktiv Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 40px;
    z-index: 10;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(6px);
  }

  .wordmark {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  header nav a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    margin-left: 28px;
    transition: color 0.2s ease;
  }

  header nav a:hover {
    color: var(--ink);
  }

  main {
    padding-top: 120px;
  }

  .work {
    padding: 0 0 120px;
  }

  .work-heading {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0 40px;
    margin-bottom: 32px;
  }

  .work-heading h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 0;
  }

  .controls {
    display: flex;
    gap: 10px;
  }

  .controls button {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--hairline);
    background: var(--bg);
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, border-color 0.2s ease;
  }

  .controls button:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .carousel {
    display: flex;
    gap: 28px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 0 8vw 12px;
    scrollbar-width: none;
  }

  .carousel::-webkit-scrollbar {
    display: none;
  }

  .card {
    flex: 0 0 auto;
    width: 84vw;
    scroll-snap-align: center;
  }

  .thumb {
    width: 100%;
    aspect-ratio: 16 / 10;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--c1), var(--c2));
    position: relative;
    overflow: hidden;
  }

  .thumb.is-photo {
    background: none;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb::after {
    content: attr(data-index);
    position: absolute;
    bottom: 20px;
    left: 20px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 0.05em;
  }

  .card h3 {
    font-size: 16px;
    font-weight: 500;
    margin: 18px 0 4px;
  }

  .card span {
    font-size: 13px;
    color: var(--muted);
  }

  @media (max-width: 640px) {
    header, .work-heading, .carousel {
      padding-left: 24px;
      padding-right: 24px;
    }

    .card {
      width: 88vw;
    }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">Liam</div>
  <nav>
    <a href="#about">About</a>
    <a href="#work">Work</a>
  </nav>
</header>

<main>
  <section class="work" id="work">
    <div class="work-heading">
      <h2>Selected Work</h2>
      <div class="controls">
        <button id="prev" aria-label="Previous">&#8592;</button>
        <button id="next" aria-label="Next">&#8594;</button>
      </div>
    </div>

    <div class="carousel" id="carousel">
      <div class="card">
        <div class="thumb is-photo" data-index="01">
          <img src="portfolio projects/ArtDivision/artdivison-freeway_signage-mockup.jpg" alt="Art Division &mdash; freeway signage mockup">
        </div>
        <h3>Art Division</h3>
        <span>Freeway Signage</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="02" style="--c1:#e4ddd3; --c2:#b9ac97;"></div>
        <h3>Project Two</h3>
        <span>Placeholder</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="03" style="--c1:#d9e0e4; --c2:#9fb0b8;"></div>
        <h3>Project Three</h3>
        <span>Placeholder</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="04" style="--c1:#e3dbe6; --c2:#b8a4c0;"></div>
        <h3>Project Four</h3>
        <span>Placeholder</span>
      </div>
      <div class="card">
        <div class="thumb" data-index="05" style="--c1:#dde4d8; --c2:#a9baa0;"></div>
        <h3>Project Five</h3>
        <span>Placeholder</span>
      </div>
    </div>
  </section>
</main>

<script>
  (function () {
    const track = document.getElementById('carousel');
    const originals = Array.from(track.children);
    const count = originals.length;

    const firstClone = originals[0].cloneNode(true);
    const lastClone = originals[count - 1].cloneNode(true);
    track.insertBefore(lastClone, originals[0]);
    track.appendChild(firstClone);

    const cards = Array.from(track.children);
    let index = 1;

    function centerScrollLeft(el) {
      const trackRect = track.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      return track.scrollLeft + (elRect.left - trackRect.left) - (track.clientWidth - elRect.width) / 2;
    }

    function goTo(i, smooth) {
      index = i;
      track.scrollTo({ left: centerScrollLeft(cards[i]), behavior: smooth ? 'smooth' : 'auto' });
    }

    goTo(1, false);

    document.getElementById('next').addEventListener('click', () => goTo(index + 1, true));
    document.getElementById('prev').addEventListener('click', () => goTo(index - 1, true));

    let settleTimer;
    track.addEventListener('scroll', () => {
      clearTimeout(settleTimer);
      settleTimer = setTimeout(() => {
        const trackRect = track.getBoundingClientRect();
        const center = trackRect.left + track.clientWidth / 2;
        let closest = index;
        let minDist = Infinity;
        cards.forEach((c, i) => {
          const r = c.getBoundingClientRect();
          const dist = Math.abs((r.left + r.width / 2) - center);
          if (dist < minDist) {
            minDist = dist;
            closest = i;
          }
        });
        index = closest;
        if (index === 0) {
          goTo(count, false);
        } else if (index === cards.length - 1) {
          goTo(1, false);
        }
      }, 120);
    });

    window.addEventListener('resize', () => goTo(index, false));
  })();
</script>

</body>
</html>
